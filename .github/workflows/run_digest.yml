name: Run Muscle Digest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Date window in days"
        required: false
        default: "7"

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Override days_back (optional)
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          config_path = pathlib.Path("config.yaml")
          data = yaml.safe_load(config_path.read_text(encoding="utf-8"))
          data["days_back"] = int("${{ github.event.inputs.days_back }}")
          config_path.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
          PY

      - name: Run digest
        run: python run_weekly_digest.py --config config.yaml

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-muscle-digest
          path: |
            weekly_muscle_digest_*.md
            run_log.json
            state_seen.json
